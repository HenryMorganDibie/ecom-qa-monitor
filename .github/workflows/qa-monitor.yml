name: Ecom QA Monitor

on:
  push:
    branches: [master]

  schedule:
    - cron: "*/30 * * * *"

  workflow_dispatch:

jobs:
  qa-monitor:
    name: Run Health Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      # ✅ SAFE CONFIG WRITE (handles multiline JSON properly)
      - name: Write config from secret
        run: |
          printf "%s" "$MONITOR_CONFIG" > config.json
        env:
          MONITOR_CONFIG: ${{ secrets.MONITOR_CONFIG }}

      # 🔍 Validate config early (FAIL FAST)
      - name: Validate config
        run: |
          echo "Validating config.json..."
          cat config.json
          node -e "const fs=require('fs'); JSON.parse(fs.readFileSync('config.json','utf8')); console.log('JSON valid ✔')"

      # 🚀 Run monitor
      - name: Run QA monitor
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: node src/runner.js

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            core.warning(
              `🚨 QA Monitor detected failures at ${new Date().toISOString()}.
               Check run logs: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            )

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm test -- --coverage

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7